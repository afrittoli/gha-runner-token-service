name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: read-all

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "minor=$(echo "${VERSION}" | cut -d. -f1,2)" >> $GITHUB_OUTPUT
          echo "major=$(echo "${VERSION}" | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          body: |
            ### Docker Images
            - Backend: `${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}`
            - Frontend: `${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}`

            ### Helm Chart Installation

            **From OCI Registry:**
            ```bash
            helm install gharts oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/gharts --version ${{ steps.get_version.outputs.version }}
            ```

            **From GitHub Release:**
            ```bash
            helm install gharts ./gharts-${{ steps.get_version.outputs.version }}.tgz
            ```

            **With Custom Values:**
            ```bash
            helm install gharts oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/gharts \
              --version ${{ steps.get_version.outputs.version }} \
              -f my-values.yaml
            ```

            ### Available Chart Tags
            - `${{ steps.get_version.outputs.version }}` - This specific version
            - `${{ steps.get_version.outputs.minor }}` - Latest patch in this minor version
            - `${{ steps.get_version.outputs.major }}` - Latest minor in this major version
            - `latest` - Latest stable release

            ### Documentation
            - [Deployment Guide](docs/deployment_checklist.md)
            - [Kubernetes Deployment](docs/kubernetes_deployment.md)
            - [Helm Chart README](helm/gharts/README.md)

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-frontend:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package-helm-chart:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: 'v3.13.0'

      - name: Update Chart version
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i "s/^version:.*/version: ${VERSION}/" helm/gharts/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/gharts/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package helm/gharts

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: ./gharts-${{ needs.create-release.outputs.version }}.tgz

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          CHART_FILE="gharts-${VERSION}.tgz"

          # Push the chart to GHCR
          # The chart version is embedded in the package filename
          echo "Pushing chart: $CHART_FILE (version: ${VERSION})"
          helm push "$CHART_FILE" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

          echo "✅ Helm chart published to GHCR"
          echo "Chart can be installed with:"
          echo "  helm install gharts oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/gharts --version ${VERSION}"

  verify-deployment:
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, build-and-push-frontend, package-helm-chart]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: test-cluster

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: 'v3.13.0'

      - name: Deploy to kind
        run: |
          VERSION=${{ needs.create-release.outputs.version }}

          # Update Chart version
          sed -i "s/^version:.*/version: ${VERSION}/" helm/gharts/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/gharts/Chart.yaml

          # Pre-create required k8s Secrets (chart never creates secrets from inline values)
          kubectl create secret generic gharts-github \
            --from-literal=private-key.pem="-----BEGIN RSA PRIVATE KEY-----\ntest-key\n-----END RSA PRIVATE KEY-----"
          kubectl create secret generic gharts-oidc \
            --from-literal=oidc-client-id=test-client

          # Install chart
          helm install gharts ./helm/gharts --wait --timeout 5m \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }} \
            --set backend.image.tag=${VERSION} \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }} \
            --set frontend.image.tag=${VERSION} \
            --set postgresql.enabled=true \
            --set postgresql.auth.username=testuser \
            --set postgresql.auth.password=testpass \
            --set postgresql.auth.database=testdb \
            --set github.organization=test-org \
            --set github.appId=123456 \
            --set github.installationId=789 \
            --set github.privateKeySecret=gharts-github \
            --set github.privateKeySecretKey=private-key.pem \
            --set oidc.enabled=true \
            --set oidc.issuer=https://example.com/ \
            --set oidc.audience=gharts \
            --set oidc.jwksUrl=https://example.com/.well-known/jwks.json \
            --set oidc.clientIdSecret=gharts-oidc \
            --set oidc.clientIdSecretKey=oidc-client-id

          # Run Helm tests
          helm test gharts

      - name: Check deployment status
        run: |
          kubectl get all -A
          kubectl describe pods -l app.kubernetes.io/name=gharts
