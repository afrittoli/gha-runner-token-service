name: Docker and Helm

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && 'gharts-backend:test' || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          outputs: ${{ github.event_name == 'pull_request' && 'type=docker' || 'type=registry' }}

  test-helm-deployment:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend from cache
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: gharts-backend:test
          cache-from: type=gha

      - name: Build frontend from cache
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: gharts-frontend:test
          cache-from: type=gha

      - name: Set up kind
        uses: helm/kind-action@dda0770415bac9fc20092cacbc54aa298604d140 # v1.8.0
        with:
          cluster_name: helm-test-cluster

      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: 'v3.13.0'

      - name: Load images into kind
        run: |
          kind load docker-image gharts-backend:test --name helm-test-cluster
          kind load docker-image gharts-frontend:test --name helm-test-cluster

      - name: Verify images in kind
        run: |
          echo "Images loaded in kind cluster:"
          docker exec helm-test-cluster-control-plane crictl images | grep gharts || true

      - name: Pre-create k8s Secrets
        run: |
          kubectl create secret generic gharts-github \
            --from-literal=private-key.pem="-----BEGIN RSA PRIVATE KEY-----\ntest-key\n-----END RSA PRIVATE KEY-----"
          kubectl create secret generic gharts-oidc \
            --from-literal=oidc-client-id=test-client-id

      - name: Install chart
        run: |
          helm install gharts-test ./helm/gharts \
            --wait \
            --timeout 2m \
            --debug \
            --set backend.image.repository=gharts-backend \
            --set backend.image.tag=test \
            --set backend.image.pullPolicy=IfNotPresent \
            --set frontend.image.repository=gharts-frontend \
            --set frontend.image.tag=test \
            --set frontend.image.pullPolicy=IfNotPresent \
            --set postgresql.enabled=false \
            --set extraEnv[0].name=DATABASE_URL \
            --set 'extraEnv[0].value=sqlite:///:memory:' \
            --set github.organization=test-org \
            --set github.appId=123456 \
            --set github.installationId=789012 \
            --set github.privateKeySecret=gharts-github \
            --set github.privateKeySecretKey=private-key.pem \
            --set oidc.enabled=true \
            --set oidc.issuer=https://example.com/ \
            --set oidc.audience=test-audience \
            --set oidc.jwksUrl=https://example.com/.well-known/jwks.json \
            --set oidc.clientIdSecret=gharts-oidc \
            --set oidc.clientIdSecretKey=oidc-client-id \
            --set oidc.redirectUri=http://localhost/app/callback \
            --set oidc.postLogoutRedirectUri=http://localhost/app \
            --set ingress.enabled=false

      - name: Run Helm tests
        run: helm test gharts-test --timeout 2m

      - name: Check deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Services ==="
          kubectl get svc -A
          echo ""
          echo "=== Deployments ==="
          kubectl get deployments -A

      - name: Show pod logs on failure
        if: failure()
        run: |
          echo "=== Pod Events ==="
          kubectl describe pods -l app.kubernetes.io/instance=gharts-test || true
          echo ""
          echo "=== Backend Logs ==="
          kubectl logs -l app.kubernetes.io/component=backend --tail=100 || true
          echo ""
          echo "=== Frontend Logs ==="
          kubectl logs -l app.kubernetes.io/component=frontend --tail=100 || true
          echo ""
          echo "=== PostgreSQL Logs ==="
          kubectl logs -l app.kubernetes.io/name=postgresql --tail=100 || true

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, test-helm-deployment]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: 'v3.13.0'

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart version for main branch
        run: |
          # Use a development version with commit SHA
          CHART_VERSION="0.0.0-main.${GITHUB_SHA::7}"
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" helm/gharts/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"main-${GITHUB_SHA::7}\"/" helm/gharts/Chart.yaml
          echo "Updated chart version to: ${CHART_VERSION}"

      - name: Package Helm chart
        run: |
          helm package helm/gharts

      - name: Push chart to GHCR
        run: |
          # Push the chart to GHCR
          # The chart version is embedded in the package filename
          CHART_PACKAGE=$(ls gharts-*.tgz)
          echo "Pushing chart: $CHART_PACKAGE"
          helm push "$CHART_PACKAGE" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

          echo "✅ Helm chart published to GHCR"
          echo "Chart can be installed with:"
          echo "  helm install gharts oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/gharts"

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && 'gharts-frontend:test' || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          outputs: ${{ github.event_name == 'pull_request' && 'type=docker' || 'type=registry' }}
