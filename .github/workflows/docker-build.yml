name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && 'gharts-backend:test' || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          outputs: ${{ github.event_name == 'pull_request' && 'type=docker' || 'type=registry' }}

  test-helm-deployment:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend from cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: gharts-backend:test
          cache-from: type=gha

      - name: Build frontend from cache
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: gharts-frontend:test
          cache-from: type=gha

      - name: Set up kind
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: helm-test-cluster

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Load images into kind
        run: |
          kind load docker-image gharts-backend:test --name helm-test-cluster
          kind load docker-image gharts-frontend:test --name helm-test-cluster

      - name: Verify images in kind
        run: |
          echo "Images loaded in kind cluster:"
          docker exec helm-test-cluster-control-plane crictl images | grep gharts || true

      - name: Create test values
        run: |
          cat > test-values.yaml <<EOF
          # Backend configuration
          backend:
            image:
              repository: gharts-backend
              tag: test
              pullPolicy: IfNotPresent

          # Frontend configuration
          frontend:
            image:
              repository: gharts-frontend
              tag: test
              pullPolicy: IfNotPresent
            config:
              oidc:
                authority: "https://example.com"
                clientId: "test-client-id"
                audience: "test-audience"
                redirectUri: "http://localhost/app/callback"
                postLogoutRedirectUri: "http://localhost/app"
              api:
                baseUrl: ""

          # Use in-memory SQLite for CI testing (no external database needed)
          postgresql:
            enabled: false

          # In-memory SQLite configuration (no persistence needed for tests)
          extraEnv:
            - name: DATABASE_URL
              value: "sqlite:///:memory:"

          # Application configuration
          config:
            github:
              appId: "123456"
              installationId: "789012"
              privateKey: |
                -----BEGIN RSA PRIVATE KEY-----
                MIIEpAIBAAKCAQEAtest
                -----END RSA PRIVATE KEY-----
              organization: "test-org"
            oidc:
              enabled: true
              issuer: "https://example.com"
              audience: "test-audience"
              jwksUrl: "https://example.com/.well-known/jwks.json"
            logLevel: "INFO"
            adminIdentities: "admin@example.com"
            sync:
              enabled: false
              intervalSeconds: 300
              onStartup: false

          # Disable ingress for testing
          ingress:
            enabled: false
          EOF

      - name: Install chart
        run: |
          helm install gharts-test ./helm/gharts \
            -f test-values.yaml \
            --wait \
            --timeout 2m \
            --debug

      - name: Run Helm tests
        run: helm test gharts-test --timeout 2m

      - name: Check deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Services ==="
          kubectl get svc -A
          echo ""
          echo "=== Deployments ==="
          kubectl get deployments -A

      - name: Show pod logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          kubectl logs -l app.kubernetes.io/component=backend --tail=100 || true
          echo ""
          echo "=== Frontend Logs ==="
          kubectl logs -l app.kubernetes.io/component=frontend --tail=100 || true
          echo ""
          echo "=== PostgreSQL Logs ==="
          kubectl logs -l app.kubernetes.io/name=postgresql --tail=100 || true

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, test-helm-deployment]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for chart tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gharts
          tags: |
            type=ref,event=branch
            type=sha

      - name: Package Helm chart
        run: |
          helm package helm/gharts

      - name: Push chart to GHCR
        run: |
          # Extract tags from metadata
          TAGS="${{ steps.meta.outputs.tags }}"

          # Push chart with each tag
          for tag in $TAGS; do
            # Extract just the tag part (after the last :)
            chart_tag="${tag##*:}"
            echo "Pushing chart with tag: $chart_tag"
            helm push gharts-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }} --version "$chart_tag"
          done

          echo "✅ Helm chart published to GHCR"

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && 'gharts-frontend:test' || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          outputs: ${{ github.event_name == 'pull_request' && 'type=docker' || 'type=registry' }}
