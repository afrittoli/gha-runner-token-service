name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'

permissions: read-all

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Check formatting (modules)
        run: terraform fmt -check -recursive terraform/modules

      - name: Check formatting (environments)
        run: terraform fmt -check -recursive terraform/environments

      - name: Validate auth0 module
        working-directory: terraform/modules/auth0
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate example environment
        working-directory: terraform/environments/example
        run: |
          terraform init -backend=false
          terraform validate
