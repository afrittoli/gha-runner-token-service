name: Helm Chart Lint

on:
  push:
    branches: [main]
    paths:
      - 'helm/gharts/**'
      - '.github/workflows/helm-chart.yml'
  pull_request:
    branches: [main]
    paths:
      - 'helm/gharts/**'
      - '.github/workflows/helm-chart.yml'

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: 'v3.13.0'

      - name: Lint chart
        run: helm lint helm/gharts

      - name: Validate chart templates (built-in postgres)
        run: |
          helm template test-release helm/gharts \
            --set github.organization=test-org \
            --set github.appId=123456 \
            --set github.installationId=789 \
            --set github.privateKeySecret=test-github-secret \
            --set oidc.issuer=https://example.com/ \
            --set oidc.audience=gharts \
            --set oidc.jwksUrl=https://example.com/.well-known/jwks.json \
            --set oidc.clientIdSecret=test-oidc-secret \
            --set postgresql.auth.password=test-password \
            > /dev/null
          echo "✅ Chart templates valid (built-in postgres)"

      - name: Validate chart templates (external database)
        run: |
          helm template test-release helm/gharts \
            --set github.organization=test-org \
            --set github.appId=123456 \
            --set github.installationId=789 \
            --set github.privateKeySecret=test-github-secret \
            --set oidc.issuer=https://example.com/ \
            --set oidc.audience=gharts \
            --set oidc.jwksUrl=https://example.com/.well-known/jwks.json \
            --set oidc.clientIdSecret=test-oidc-secret \
            --set postgresql.enabled=false \
            --set database.databaseUrlSecret=test-db-secret \
            > /dev/null
          echo "✅ Chart templates valid (external database)"

      - name: Package chart
        run: |
          helm package helm/gharts
          ls -lh gharts-*.tgz

      - name: Upload packaged chart
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: gharts-*.tgz
          retention-days: 7
