apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gharts.fullname" . }}-test-connection"
  labels:
    {{- include "gharts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:latest
      command: ['sh', '-c']
      args:
        - |
          # Get the service IP and connect directly to avoid IPv6 issues
          SERVICE_IP=$(nslookup {{ include "gharts.fullname" . }}-frontend | grep "Address:" | tail -n1 | awk '{print $2}')
          wget -O- http://${SERVICE_IP}:{{ .Values.frontend.service.port }}/health
  restartPolicy: Never


