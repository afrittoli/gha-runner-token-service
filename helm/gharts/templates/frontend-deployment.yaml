apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gharts.fullname" . }}-frontend
  labels:
    {{- include "gharts.frontend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.frontend }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gharts.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/frontend-config: {{ include (print $.Template.BasePath "/frontend-config-configmap.yaml") . | sha256sum }}
        checksum/nginx: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gharts.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gharts.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
      - name: frontend
        securityContext:
          {{- toYaml .Values.frontend.securityContext | nindent 10 }}
        image: {{ include "gharts.frontend.image" . }}
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.frontend.service.targetPort }}
          protocol: TCP
        env:
        # OIDC configuration from ConfigMap (non-sensitive)
        - name: OIDC_AUTHORITY
          valueFrom:
            configMapKeyRef:
              name: {{ include "gharts.fullname" . }}-frontend-config
              key: oidc-authority
        - name: OIDC_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: {{ include "gharts.fullname" . }}-frontend-config
              key: oidc-audience
        - name: OIDC_REDIRECT_URI
          valueFrom:
            configMapKeyRef:
              name: {{ include "gharts.fullname" . }}-frontend-config
              key: oidc-redirect-uri
        - name: OIDC_POST_LOGOUT_REDIRECT_URI
          valueFrom:
            configMapKeyRef:
              name: {{ include "gharts.fullname" . }}-frontend-config
              key: oidc-post-logout-redirect-uri
        # OIDC client ID from pre-existing k8s Secret
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ required "oidc.clientIdSecret must be set to a k8s Secret containing the OIDC client ID" .Values.oidc.clientIdSecret }}
              key: {{ .Values.oidc.clientIdSecretKey }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.frontend.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.frontend.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: {{ include "gharts.fullname" . }}-nginx
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
