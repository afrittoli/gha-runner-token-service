apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gharts.fullname" . }}-backend
  labels:
    {{- include "gharts.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.backend }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gharts.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.postgresql.enabled }}
        checksum/db-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gharts.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gharts.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      {{- if or .Values.initContainers .Values.postgresql.enabled }}
      initContainers:
      {{- with .Values.initContainers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      - name: wait-for-postgresql
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ include "gharts.database.host" . }} 5432; do
            echo "Waiting for PostgreSQL at {{ include "gharts.database.host" . }}:5432..."
            sleep 2
          done
          echo "PostgreSQL is ready."
      {{- end }}
      {{- end }}
      containers:
      - name: backend
        securityContext:
          {{- toYaml .Values.backend.securityContext | nindent 10 }}
        image: {{ include "gharts.backend.image" . }}
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.service.targetPort }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "gharts.fullname" . }}-config
        env:
        # DATABASE_URL — from chart-created secret (built-in postgres), from a pre-existing
        # k8s Secret (external database), or omitted entirely when IAM auth is enabled
        # (the app constructs the URL from individual env vars and fetches a token at runtime)
        # or when provided via extraEnv (e.g. SQLite for CI).
        {{- if .Values.postgresql.enabled }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "gharts.fullname" . }}-postgres-url
              key: DATABASE_URL
        {{- else if and (not .Values.database.iamAuth.enabled) .Values.database.databaseUrlSecret }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.databaseUrlSecret }}
              key: {{ .Values.database.databaseUrlSecretKey }}
        {{- end }}
        # Optional webhook HMAC secret
        {{- if .Values.github.webhookSecret }}
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.github.webhookSecret }}
              key: {{ .Values.github.webhookSecretKey }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.backend.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.backend.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
        - name: github-key
          mountPath: /secrets/github
          readOnly: true
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.sidecars }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: github-key
        secret:
          secretName: {{ required "github.privateKeySecret must be set to a k8s Secret containing the GitHub App private key" .Values.github.privateKeySecret }}
          defaultMode: 0400
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
