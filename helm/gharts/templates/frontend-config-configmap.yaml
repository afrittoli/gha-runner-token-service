apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gharts.fullname" . }}-frontend-config
  labels:
    {{- include "gharts.frontend.labels" . | nindent 4 }}
data:
  # OIDC configuration (non-sensitive) — authority is the backend issuer URL
  oidc-authority: {{ .Values.oidc.issuer | quote }}
  oidc-audience: {{ .Values.oidc.audience | quote }}
  {{- if .Values.oidc.redirectUri }}
  oidc-redirect-uri: {{ tpl .Values.oidc.redirectUri . | quote }}
  {{- else if .Values.ingress.enabled }}
  oidc-redirect-uri: "https://{{ (index .Values.ingress.hosts 0).host }}/app/callback"
  {{- else if .Values.gateway.enabled }}
  oidc-redirect-uri: "https://{{ (index .Values.gateway.hosts 0).hostname }}/app/callback"
  {{- else }}
  oidc-redirect-uri: ""
  {{- end }}
  {{- if .Values.oidc.postLogoutRedirectUri }}
  oidc-post-logout-redirect-uri: {{ tpl .Values.oidc.postLogoutRedirectUri . | quote }}
  {{- else if .Values.ingress.enabled }}
  oidc-post-logout-redirect-uri: "https://{{ (index .Values.ingress.hosts 0).host }}/app"
  {{- else if .Values.gateway.enabled }}
  oidc-post-logout-redirect-uri: "https://{{ (index .Values.gateway.hosts 0).hostname }}/app"
  {{- else }}
  oidc-post-logout-redirect-uri: ""
  {{- end }}
