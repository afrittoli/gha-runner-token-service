apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gharts.fullname" . }}-frontend-config
  labels:
    {{- include "gharts.frontend.labels" . | nindent 4 }}
data:
  # OIDC configuration (non-sensitive)
  oidc-authority: {{ .Values.frontend.config.oidc.authority | quote }}
  oidc-audience: {{ .Values.frontend.config.oidc.audience | quote }}
  {{- if .Values.frontend.config.oidc.redirectUri }}
  oidc-redirect-uri: {{ tpl .Values.frontend.config.oidc.redirectUri . | quote }}
  {{- else }}
  # Default: use first ingress host
  oidc-redirect-uri: "https://{{ (index .Values.ingress.hosts 0).host }}/app/callback"
  {{- end }}
  {{- if .Values.frontend.config.oidc.postLogoutRedirectUri }}
  oidc-post-logout-redirect-uri: {{ tpl .Values.frontend.config.oidc.postLogoutRedirectUri . | quote }}
  {{- else }}
  # Default: use first ingress host
  oidc-post-logout-redirect-uri: "https://{{ (index .Values.ingress.hosts 0).host }}/app"
  {{- end }}
  # API configuration
  api-base-url: {{ .Values.frontend.config.api.baseUrl | quote }}
