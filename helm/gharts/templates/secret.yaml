{{- if .Values.postgresql.enabled }}
# When using the built-in Bitnami PostgreSQL sub-chart, the chart creates a
# Secret containing the DATABASE_URL so the backend can connect.
# For external databases (postgresql.enabled=false), provide database.databaseUrlSecret
# pointing to a pre-existing k8s Secret with the full connection string.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gharts.fullname" . }}-postgres-url
  labels:
    {{- include "gharts.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "gharts.database.host" . }}:5432/{{ .Values.postgresql.auth.database }}"
{{- end }}
