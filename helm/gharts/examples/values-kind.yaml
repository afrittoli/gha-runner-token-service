# Kind Cluster Values
# Optimized for local kind cluster testing.
# Usage:
#   # Pre-create Secrets
#   kubectl create secret generic gharts-github \
#     --from-file=private-key.pem=/path/to/private-key.pem
#   kubectl create secret generic gharts-oidc \
#     --from-literal=oidc-client-id=your-kind-client-id
#
#   # If using an external postgres installed separately:
#   kubectl create secret generic gharts-db \
#     --from-literal=DATABASE_URL="postgresql://gharts:gharts@gharts-postgresql:5432/gharts?sslmode=disable"
#
#   # Install
#   helm install gharts ./helm/gharts -f helm/gharts/examples/values-kind.yaml

replicaCount:
  backend: 1
  frontend: 1

backend:
  image:
    repository: ghcr.io/afrittoli/gharts-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  autoscaling:
    enabled: false

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

frontend:
  image:
    repository: ghcr.io/afrittoli/gharts-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  autoscaling:
    enabled: false

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ─── OIDC ─────────────────────────────────────────────────────────────────────
oidc:
  enabled: true
  issuer: "https://your-oidc-provider.com"
  audience: "gharts"
  jwksUrl: "https://your-oidc-provider.com/.well-known/jwks.json"
  redirectUri: "http://gharts.local/app/callback"
  postLogoutRedirectUri: "http://gharts.local/app"
  clientIdSecret: "gharts-oidc"
  clientIdSecretKey: "oidc-client-id"

# ─── GitHub App ───────────────────────────────────────────────────────────────
github:
  organization: "your-org"
  appId: "123456"
  installationId: "12345678"
  privateKeySecret: "gharts-github"
  privateKeySecretKey: "private-key.pem"

# ─── Database ─────────────────────────────────────────────────────────────────
# Option A: use the built-in sub-chart (simpler)
postgresql:
  enabled: true
  auth:
    username: gharts
    password: "gharts"
    database: gharts
  primary:
    persistence:
      enabled: false  # no persistence needed for kind testing

# Option B: external postgres installed separately — set postgresql.enabled: false
# and uncomment:
# postgresql:
#   enabled: false
# database:
#   sslMode: disable
#   databaseUrlSecret: "gharts-db"
#   databaseUrlSecretKey: "DATABASE_URL"

# ─── Application ──────────────────────────────────────────────────────────────
config:
  logLevel: "DEBUG"
  sync:
    enabled: true
    intervalSeconds: 60
    onStartup: true
  labelPolicy: "audit"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: gharts.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

podDisruptionBudget:
  enabled: false
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1

monitoring:
  enabled: false
