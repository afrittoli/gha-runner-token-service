# Staging Environment Values
# Production-like configuration with reduced resources.
#
# Pre-create the required Secrets before installing:
#
#   kubectl create secret generic gharts-github \
#     --from-file=private-key.pem=/path/to/staging-private-key.pem
#
#   kubectl create secret generic gharts-oidc \
#     --from-literal=oidc-client-id=<staging-client-id>
#
# The built-in PostgreSQL sub-chart is used for staging to avoid needing a
# managed database. For a production-grade staging, switch to an external DB.

replicaCount:
  backend: 2
  frontend: 1

backend:
  image:
    repository: ghcr.io/afrittoli/gharts-backend
    tag: ""
    pullPolicy: Always

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    repository: ghcr.io/afrittoli/gharts-frontend
    tag: ""
    pullPolicy: Always

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ─── OIDC ─────────────────────────────────────────────────────────────────────
oidc:
  enabled: true
  issuer: "https://staging-auth.example.com/"
  audience: "gharts"
  jwksUrl: "https://staging-auth.example.com/.well-known/jwks.json"
  clientIdSecret: "gharts-oidc"
  clientIdSecretKey: "oidc-client-id"

# ─── GitHub App ───────────────────────────────────────────────────────────────
github:
  organization: "your-org"
  appId: "123456"
  installationId: "12345678"
  privateKeySecret: "gharts-github"
  privateKeySecretKey: "private-key.pem"

# ─── Database (built-in for staging) ──────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: gharts
    password: "staging-db-password"  # change to a real password
    database: gharts
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "standard"

# ─── Application ──────────────────────────────────────────────────────────────
config:
  logLevel: "INFO"
  sync:
    enabled: true
    intervalSeconds: 300
    onStartup: true
  labelPolicy: "audit"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: staging.gharts.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gharts-staging-tls
      hosts:
        - staging.gharts.example.com

# ─── Availability ─────────────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1

# ─── Monitoring ───────────────────────────────────────────────────────────────
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 60s
