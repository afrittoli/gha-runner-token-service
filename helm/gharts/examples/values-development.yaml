# Development Environment Values
# Minimal configuration for local development and testing.
#
# Pre-create the required Secrets before installing:
#
#   kubectl create secret generic gharts-github \
#     --from-file=private-key.pem=/path/to/dev-private-key.pem
#
#   kubectl create secret generic gharts-oidc \
#     --from-literal=oidc-client-id=dev-client-id
#
# Then install (with port-forward for access):
#   helm install gharts ./helm/gharts -f helm/gharts/examples/values-development.yaml
#   kubectl port-forward svc/gharts-frontend 8080:80

replicaCount:
  backend: 1
  frontend: 1

backend:
  image:
    repository: ghcr.io/afrittoli/gharts-backend
    tag: "latest"
    pullPolicy: Always

  autoscaling:
    enabled: false

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

frontend:
  image:
    repository: ghcr.io/afrittoli/gharts-frontend
    tag: "latest"
    pullPolicy: Always

  autoscaling:
    enabled: false

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ─── OIDC ─────────────────────────────────────────────────────────────────────
oidc:
  enabled: true
  issuer: "https://dev-oidc.example.com"
  audience: "gharts"
  jwksUrl: "https://dev-oidc.example.com/.well-known/jwks.json"
  redirectUri: "http://localhost:8080/app/callback"
  postLogoutRedirectUri: "http://localhost:8080/app"
  clientIdSecret: "gharts-oidc"
  clientIdSecretKey: "oidc-client-id"

# ─── GitHub App ───────────────────────────────────────────────────────────────
github:
  organization: "your-org"
  appId: "123456"
  installationId: "12345678"
  privateKeySecret: "gharts-github"
  privateKeySecretKey: "private-key.pem"

# ─── Database (built-in for development) ──────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: gharts
    password: "devpassword"
    database: gharts
  primary:
    persistence:
      enabled: true
      size: 1Gi

# ─── Application ──────────────────────────────────────────────────────────────
config:
  logLevel: "DEBUG"
  sync:
    enabled: true
    intervalSeconds: 60
    onStartup: true
  labelPolicy: "audit"

# No ingress for development (use port-forward)
ingress:
  enabled: false

podDisruptionBudget:
  enabled: false
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1

monitoring:
  enabled: false
