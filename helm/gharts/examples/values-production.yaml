# Production Environment Values
# High availability configuration with external managed database and autoscaling.
#
# All secrets are expected to exist as k8s Secret resources before installation.
# Create them via your secret management tool (e.g. kubectl, Vault Agent, ESO):
#
#   kubectl create secret generic gharts-github \
#     --from-file=private-key.pem=/path/to/private-key.pem
#
#   kubectl create secret generic gharts-oidc \
#     --from-literal=oidc-client-id=<your-client-id>
#
#   kubectl create secret generic gharts-db \
#     --from-literal=DATABASE_URL="postgresql://user:pass@host:5432/gharts?sslmode=require"

replicaCount:
  backend: 3
  frontend: 2

backend:
  image:
    repository: ghcr.io/afrittoli/gharts-backend
    tag: ""  # Defaults to chart appVersion; pin to a specific version in production
    pullPolicy: IfNotPresent

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  nodeSelector:
    workload: application

  tolerations:
    - key: "workload"
      operator: "Equal"
      value: "application"
      effect: "NoSchedule"

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - backend
            topologyKey: kubernetes.io/hostname

frontend:
  image:
    repository: ghcr.io/afrittoli/gharts-frontend
    tag: ""  # Defaults to chart appVersion; pin to a specific version in production
    pullPolicy: IfNotPresent

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  nodeSelector:
    workload: application

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - frontend
            topologyKey: kubernetes.io/hostname

# ─── OIDC ─────────────────────────────────────────────────────────────────────
oidc:
  enabled: true
  issuer: "https://auth.example.com/"
  audience: "gharts"
  jwksUrl: "https://auth.example.com/.well-known/jwks.json"
  # redirectUri and postLogoutRedirectUri default to the ingress host below
  clientIdSecret: "gharts-oidc"       # pre-existing k8s Secret
  clientIdSecretKey: "oidc-client-id"

# ─── GitHub App ───────────────────────────────────────────────────────────────
github:
  organization: "your-org"
  appId: "123456"
  installationId: "12345678"
  privateKeySecret: "gharts-github"   # pre-existing k8s Secret
  privateKeySecretKey: "private-key.pem"
  # webhookSecret: "gharts-webhook"   # uncomment to enable webhook verification

# ─── Database ─────────────────────────────────────────────────────────────────
postgresql:
  enabled: false  # Use external managed database for production

database:
  host: "prod-db.xxxx.us-east-1.rds.amazonaws.com"
  port: 5432
  name: gharts
  username: gharts
  sslMode: verify-full
  sslRootCertPath: "/secrets/rds-ca/rds-ca-bundle.pem"  # mount via extraVolumes

  # Auth option B — IAM RDS authentication (recommended; no password secret needed)
  iamAuth:
    enabled: true
    region: "us-east-1"

  # Auth option A — static password (leave iamAuth.enabled=false and set these instead)
  # databaseUrlSecret: "gharts-db"
  # databaseUrlSecretKey: "DATABASE_URL"

  poolSize: 20
  maxOverflow: 10
  poolRecycle: 900   # must be below RDS IAM token TTL (15 min = 900 s)

# ─── Application ──────────────────────────────────────────────────────────────
config:
  logLevel: "INFO"
  sync:
    enabled: true
    intervalSeconds: 300
    onStartup: true
  runner:
    defaultGroupId: 1
    tokenExpiryHours: 1
    cleanupStaleHours: 24
  labelPolicy: "enforce"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: gharts.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gharts-tls
      hosts:
        - gharts.example.com

# ─── Service account with IRSA for AWS ────────────────────────────────────────
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/gharts-role"
  name: "gharts"

# ─── Availability ─────────────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  backend:
    minAvailable: 2
  frontend:
    minAvailable: 1

# ─── Monitoring ───────────────────────────────────────────────────────────────
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      prometheus: kube-prometheus
