# Default values for gharts.
# This is a YAML-formatted file.

# Global settings
global:
  imagePullSecrets: []
  # - name: regcred

# Replica counts
replicaCount:
  backend: 2
  frontend: 2

# Backend (FastAPI) configuration
backend:
  image:
    repository: ghcr.io/afrittoli/gharts-backend
    pullPolicy: IfNotPresent
    tag: "" # Defaults to chart appVersion

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    annotations: {}

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Frontend (Nginx + React) configuration
frontend:
  image:
    repository: ghcr.io/afrittoli/gharts-frontend
    pullPolicy: IfNotPresent
    tag: "" # Defaults to chart appVersion

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080  # nginx listens on 8080
    annotations: {}

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false  # nginx writes config.js at startup

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─── OIDC configuration (shared by backend and frontend) ──────────────────────
# Non-sensitive values go to ConfigMap. The client ID is read from a
# pre-existing k8s Secret — the chart creates no Secret resources for OIDC.
oidc:
  enabled: true

  # OIDC provider issuer URL — used as the backend issuer and frontend authority
  issuer: ""

  # Audience claim expected by the backend and requested by the frontend
  audience: ""

  # JWKS URL used by the backend to validate tokens
  jwksUrl: ""

  # Frontend redirect URLs (non-sensitive, stored in ConfigMap).
  # When empty, defaults to https://<first ingress host>/app/callback and /app.
  redirectUri: ""
  postLogoutRedirectUri: ""

  # OIDC client ID (SENSITIVE).
  # Reference a pre-existing k8s Secret containing the client ID.
  clientIdSecret: ""                    # k8s Secret name  (required)
  clientIdSecretKey: "oidc-client-id"   # key within the Secret

# ─── GitHub App configuration ─────────────────────────────────────────────────
# Non-sensitive fields go to ConfigMap. The private key is read from a
# pre-existing k8s Secret — the chart creates no Secret resources for GitHub.
github:
  organization: ""
  appId: ""
  installationId: ""

  # Override for GitHub Enterprise Server; leave as default for github.com
  apiUrl: "https://api.github.com"

  # GitHub App private key (SENSITIVE).
  # Reference a pre-existing k8s Secret containing the PEM private key.
  privateKeySecret: ""                    # k8s Secret name  (required)
  privateKeySecretKey: "private-key.pem"  # key within the Secret

  # Webhook HMAC secret (SENSITIVE, optional).
  # Leave webhookSecret empty to disable webhook signature verification.
  webhookSecret: ""                     # k8s Secret name
  webhookSecretKey: "webhook-secret"    # key within the Secret

# ─── Database ─────────────────────────────────────────────────────────────────
# Bitnami PostgreSQL sub-chart — for development and CI only.
# Set enabled: false for any persistent or production environment and configure
# the external database section below instead.
postgresql:
  enabled: true
  auth:
    username: gharts
    password: ""  # Set a password before use
    database: gharts
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

# External managed database — required when postgresql.enabled=false.
# Typical for AWS RDS, Google Cloud SQL, Azure Database for PostgreSQL, etc.
database:
  host: ""   # e.g. mydb.xxxx.us-east-1.rds.amazonaws.com
  port: 5432
  name: gharts
  username: gharts
  sslMode: require  # disable|allow|prefer|require|verify-ca|verify-full

  # ── Auth option A — static password ──────────────────────────────────────
  # Reference a pre-existing k8s Secret containing the complete connection string,
  # e.g.: postgresql://user:pass@host:5432/dbname?sslmode=require
  # Required when postgresql.enabled=false AND iamAuth.enabled=false.
  databaseUrlSecret: ""                 # k8s Secret name
  databaseUrlSecretKey: "DATABASE_URL"  # key within the Secret

  # ── Auth option B — AWS IAM RDS authentication (passwordless) ─────────────
  # Requires the pod's service account to be annotated with an IAM role that has
  # rds-db:connect permission (IRSA). No password secret is needed.
  # Recommended: set poolRecycle to 900 (< RDS token TTL of 15 min).
  iamAuth:
    enabled: false
    region: ""   # AWS region, e.g. us-east-1

  # Connection pool tuning (applies regardless of postgresql.enabled)
  poolSize: 10
  maxOverflow: 20
  poolRecycle: 3600

  # SSL certificate file paths (optional, for verify-ca / verify-full).
  # Provide the certificate files via extraVolumes + extraVolumeMounts and
  # set the in-container paths here.
  sslCertPath: ""
  sslKeyPath: ""
  sslRootCertPath: ""

# ─── Application behavior (non-sensitive) ─────────────────────────────────────
config:
  # M2M team credential support
  # Each Auth0 M2M application has metadata: {"team": "<team-name>"}.
  # An Auth0 Action copies this into the JWT as a "team" claim.
  # The backend reads the claim to resolve team context without a DB user lookup.
  teamCredentials:
    # Enable M2M team authentication (client_credentials grant)
    enabled: true
    # JWT claim that carries the team name (must match the Auth0 Action)
    teamClaim: "team"
    # Reject M2M tokens whose team claim doesn't match an active team in DB
    requireTeamInDB: true

  logLevel: "INFO"
  accessLogTracing: false

  # Comma-separated list of admin identities (email addresses or OIDC sub claims)
  adminIdentities: ""

  sync:
    enabled: true
    intervalSeconds: 300
    onStartup: true

  runner:
    defaultGroupId: 1
    tokenExpiryHours: 1
    cleanupStaleHours: 24

  # Label policy enforcement: audit (log violations) or enforce (block workflow)
  labelPolicy: "audit"
  labelDriftDeleteBusyRunners: false

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: gharts.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gharts-tls
      hosts:
        - gharts.example.com

# Gateway API configuration (alternative to Ingress)
gateway:
  enabled: false
  className: "default"
  gatewayName: "default-gateway"
  namespace: "default"
  annotations: {}
  hosts:
    - hostname: gharts.example.com
      tls:
        certificateRef:
          name: gharts-tls
          namespace: default

# ─── Kubernetes resources ─────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}  # e.g. for AWS IRSA: eks.amazonaws.com/role-arn: "arn:aws:iam::..."
  name: ""

# Per-component pod disruption budgets
podDisruptionBudget:
  enabled: true
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443  # HTTPS
        - protocol: TCP
          port: 5432  # PostgreSQL

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# ─── Extensibility ────────────────────────────────────────────────────────────
extraEnv: []
# - name: CUSTOM_VAR
#   value: "custom-value"

extraVolumes: []
# - name: custom-volume
#   emptyDir: {}

extraVolumeMounts: []
# - name: custom-volume
#   mountPath: /custom

initContainers: []
sidecars: []
